# configs/finetune/small.yaml
# Phase 2 — lightweight variant for debugging / single GPU.

tokenizer_ckpt: ???
dynamics_ckpt:  ???

packing_factor: 2
d_model_dyn: 256
dyn_depth: 4
n_heads: 4
dropout: 0.0
mlp_ratio: 4.0
time_every: 1
n_register: 4
n_agent: 1
space_mode: wm_agent_isolated
k_max: 8

bootstrap_start: 500
self_fraction: 0.25
use_actions: true

use_task_ids: false
n_tasks: 128

hidden_dim: 256
action_dim: 16
mtp_length: 8

bc_coef: 1.0
reward_coef: 1.0

lr: 3.0e-4
weight_decay: 1.0e-2
grad_clip: 1.0
eval_every: 500
