# configs/finetune/base.yaml
# Phase 2 — agent finetuning: world model + BC + reward model.
# Must match the Phase-1 dynamics architecture exactly.

# Frozen tokenizer checkpoint (Phase 1)
tokenizer_ckpt: ???

# Optional: Phase-1 dynamics checkpoint to warm-start from
dynamics_ckpt: ???

# ── Dynamics architecture (must match Phase-1 checkpoint) ───────────────────
packing_factor: 2
d_model_dyn: 512
dyn_depth: 8
n_heads: 4
dropout: 0.0
mlp_ratio: 4.0
time_every: 1
n_register: 4
n_agent: 1
space_mode: wm_agent_isolated
k_max: 8

# Shortcut / bootstrap (same settings as Phase 1)
bootstrap_start: 5000
self_fraction: 0.25
use_actions: true

# ── Task conditioning ───────────────────────────────────────────────────────
use_task_ids: false      # false → use lang_emb (512-d); true → learnable table
n_tasks: 128             # only used when use_task_ids: true

# ── Head architecture ───────────────────────────────────────────────────────
hidden_dim: 512
action_dim: 16
mtp_length: 8            # multi-token prediction look-ahead (L in eq. 9)

# ── Loss weights ────────────────────────────────────────────────────────────
bc_coef: 1.0             # weight on behavior-cloning loss
reward_coef: 1.0         # weight on reward-model loss

# ── Optimizer ───────────────────────────────────────────────────────────────
lr: 3.0e-4
weight_decay: 1.0e-2
grad_clip: 1.0

# ── Evaluation / logging ────────────────────────────────────────────────────
eval_every: 2000
