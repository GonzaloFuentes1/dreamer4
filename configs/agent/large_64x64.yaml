# configs/agent/large_64x64.yaml
# Phase 3 — imagination training para large_64x64 dynamics.
# Requiere checkpoint de Phase-2 entrenado con finetune/large_64x64.

finetune_ckpt: ???

# ---- Dynamics architecture (must match finetune/large_64x64) -----------------
packing_factor: 2
d_model_dyn: 896
dyn_depth: 12
n_heads: 8
dropout: 0.0
mlp_ratio: 4.0
time_every: 4
n_register: 8
n_agent: 1
space_mode: wm_agent_isolated
k_max: 8

# ---- Task conditioning (must match Phase-2) ----------------------------------
use_task_ids: false
n_tasks: 128
mtp_length: 8

# ---- Agent head architecture -------------------------------------------------
hidden_dim: 896
action_dim: 16

# ---- Imagination rollout -----------------------------------------------------
imagination_horizon: 15
ctx_length: 16
imagination_batch_size: 16
max_ctx_len: 32
eval_schedule: shortcut
eval_d: 0.5

# ---- RL hyperparameters (eqs. 10-11) ----------------------------------------
gamma: 0.997
lambda_: 0.95
alpha: 0.5
beta: 0.3
critic_coef: 1.0

# ---- Optimizer ---------------------------------------------------------------
lr: 5.0e-5
weight_decay: 1.0e-5
warmup_steps: 500
lr_schedule: constant_with_warmup
grad_clip: 10.0

# ---- Evaluation / logging ----------------------------------------------------
eval_every: 5000
eval_n_episodes: 1
eval_episode_len: 500
