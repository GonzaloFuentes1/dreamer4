# configs/collect/base.yaml
# Config base para Phase 0 — recolección de episodios.
# Los scripts/pipeline/train_phase0_collect_episodes.py y launch_phase0_dist.py
# usan esta config via Hydra.

tasks: [walker-walk, cheetah-run, hopper-hop]
num_envs_per_task: 4
n_episodes_per_task: 100

policy: random        # random | agent
agent_ckpt: null

out_data_dir: ./data/collected      # directorio de salida (archivos .h5)
out_videos_dir: ./data/collected/videos

img_size: 64
frame_skip: 2
episode_len: 500
action_dim: 16

save_preview_video: false
preview_video_max_frames: 300
preview_video_fps: 30
preview_video_backend: torchrl

color_randomization: false
