# configs/train_tokenizer.yaml
# Top-level config for tokenizer training.
# Composes tokenizer/base and data/local by default.
# Override via CLI: python train_tokenizer.py tokenizer=small data=cluster

defaults:
  - tokenizer: base
  - data: local
  - _self_

seed: 0
compile: true

trainer:
  max_steps: 10_000_000
  precision: "bf16-mixed"
  accumulate_grad_batches: 1
  gradient_clip_val: null
  log_every_n_steps: 5
  num_nodes: 1
  devices: 8
  strategy: ddp
  enable_progress_bar: true

checkpoint:
  dirpath: ./checkpoints/tokenizer_ckpts
  every_n_train_steps: 5000
  save_top_k: -1
  filename: "step_{step:07d}"

wandb:
  project: dreamer4-tokenizer
  name: default
  entity: null

# Optional: path to resume from (Lightning .ckpt format)
resume: null

hydra:
  run:
    dir: ${hydra:runtime.cwd}/logs/runs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${hydra:runtime.cwd}/logs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra:job.num}
