# configs/dynamics/large_64x64.yaml
# Dynamics large para tokenizer large_64x64 — ~155M parámetros (backbone).
# Escala base_64x64: d_model 512→1024, depth 8→12, n_heads 4→8, n_register 4→8.
# n_spatial=8, d_spatial=64 (igual que base — misma bottleneck del tokenizer).

tokenizer_ckpt: ???
packing_factor: 2

# Architecture
d_model_dyn: 896
dyn_depth: 12
n_heads: 8
dropout: 0.0
mlp_ratio: 4.0
time_every: 4
n_register: 8
n_agent: 1
space_mode: wm_agent_isolated
scale_pos_embeds: false
k_max: 8

# Shortcut / bootstrapping
bootstrap_start: 5000
self_fraction: 0.25
use_actions: true

# Optimizer (lr ligeramente menor para modelo más grande)
lr: 5.0e-5
weight_decay: 1.0e-2
warmup_steps: 1000
grad_clip: 1.0

# Evaluation
eval_every: 10000
eval_batch_size: 4
eval_max_items: 4
eval_ctx: 8
eval_horizon: 16
eval_schedule: shortcut
eval_d: 0.25
