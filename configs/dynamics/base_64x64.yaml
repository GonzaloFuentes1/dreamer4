# configs/dynamics/base_64x64.yaml
# Dynamics base para 64×64 — ~80M parámetros.
# Tokenizador: base_64x64 (continuo, n_latents=16) → n_spatial=8, d_spatial=64.
# Tokenizador: discrete_base_64x64 (n_latents=32) con packing=2 → n_spatial=16, d_spatial=64.

tokenizer_ckpt: ???
packing_factor: 2

# Architecture — ~80M parámetros (par con tokenizer base ~21M)
# d_model=768, depth=8, n_heads=8, n_register=4 → 81.6M medidos
# Compatible con tokenizer continuo base_64x64 y discrete_base_64x64
# (ambos producen n_spatial=8, d_spatial=64 con packing_factor=2)
d_model_dyn: 768
dyn_depth: 8
n_heads: 8
dropout: 0.0
mlp_ratio: 4.0
time_every: 4
n_register: 4
n_agent: 1
space_mode: wm_agent_isolated
scale_pos_embeds: false
k_max: 8

# Shortcut / bootstrapping
bootstrap_start: 5000
self_fraction: 0.25
use_actions: true

# Optimizer
lr: 1.0e-4
weight_decay: 1.0e-2
warmup_steps: 500
grad_clip: 1.0

# Evaluation
eval_every: 10000
eval_batch_size: 4
eval_max_items: 4
eval_ctx: 8
eval_horizon: 16
eval_schedule: shortcut
eval_d: 0.25
