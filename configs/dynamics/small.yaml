# configs/dynamics/small.yaml
# Lightweight dynamics for quick experiments.

tokenizer_ckpt: ???
packing_factor: 2

# Smaller architecture
d_model_dyn: 256
dyn_depth: 4
n_heads: 4
dropout: 0.0
mlp_ratio: 4.0
time_every: 1
n_register: 2
n_agent: 1
space_mode: wm_agent_isolated
k_max: 8

# Shortcut / bootstrapping
bootstrap_start: 500
self_fraction: 0.25
use_actions: true

# Optimizer
lr: 1.0e-4
weight_decay: 1.0e-2
grad_clip: 1.0

# Evaluation
eval_every: 200
eval_batch_size: 2
eval_max_items: 2
eval_ctx: 4
eval_horizon: 8
eval_schedule: shortcut
eval_d: 0.25
