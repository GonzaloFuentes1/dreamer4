# configs/data/cluster.yaml
# Paths de datos para runs en cluster / multi-nodo.
# Sobreescribe con tus rutas reales.
#
# Opciones (elige una):
#   data_root: /ruta/dir   → descubre automáticamente todos los .h5 del dir
#   data_dirs: [dir1, ...]  → lista explícita de dirs con archivos .h5

data_root: null
data_dirs:
  - /mnt/nfs/pretrained-64x64

tasks: null             # null = todas las encontradas en data_dirs

img_size: 64
seq_len_tokenizer: 8
batch_size_tokenizer: 8
seq_len_dynamics: 32
batch_size_dynamics: 24
num_workers: 16
frame_skip: 2
color_randomization: false
