# configs/tokenizer/discrete_64x64.yaml
# DreamerV3-style discrete tokenizer para 64×64.
#
# Representación: n_latents=32 variables categóricas × n_categories=32 clases.
# = 32 × log₂(32) = 160 bits efectivos por frame (comparable a DreamerV3 base).
#
# Tras el packing (factor=2): (B,T,16,64) → d_spatial=64.
#   → La dinámica usa spatial_proj: 64 → 512 en lugar de 128 → 512 del continuo.
#   → Necesita tokenizer y dynamics nuevos; NO es compatible con base_64x64 ckpts.
#
# Para activar: tokenizer=discrete_64x64 en run_cycles_64x64.sh
# El resto del pipeline (dynamics/finetune/agent) no necesita cambios de config,
# solo que se usen checkpoints entrenados con este tokenizer.

# ---- Modo discreto --------------------------------------------------------
discrete: true
temperature: 1.0       # temperatura del softmax categórico en entrenamiento
entropy_scale: 0.01    # peso de la regularización de entropía (maximizar uso de categorías)

# ---- Image / patching (idéntico a base_64x64) -----------------------------
H: 64
W: 64
C: 3
patch: 4

# ---- Architecture ---------------------------------------------------------
# Mismo tamaño que base_64x64 en transformer/encoder.
# d_bottleneck aquí = n_categories (tamaño del one-hot por variable discreta).
d_model: 384
n_heads: 6
depth: 6
n_latents: 32
d_bottleneck: 32       # = n_categories; d_spatial tras packing = 32×2 = 64
dropout: 0.1
mlp_ratio: 4.0
time_every: 1
latents_only_time: true
mae_p_min: 0.0
mae_p_max: 0.9

# ---- Optimizer ------------------------------------------------------------
lr: 1.0e-4
weight_decay: 1.0e-2

# ---- Loss -----------------------------------------------------------------
lpips_weight: 0.2
lpips_frac: 0.5
lpips_net: alex

# ---- Visualización --------------------------------------------------------
viz_every: 1000
viz_max_items: 4
viz_max_T: 16
