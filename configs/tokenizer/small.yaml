# configs/tokenizer/small.yaml
# Lightweight tokenizer for quick experiments / iteration.

# Image / patching
H: 128
W: 128
C: 3
patch: 4

# Architecture (smaller model)
d_model: 128
n_heads: 4
depth: 4
n_latents: 16
d_bottleneck: 32
dropout: 0.05
mlp_ratio: 4.0
time_every: 1
latents_only_time: true
mae_p_min: 0.0
mae_p_max: 0.9

# Optimizer
lr: 1.0e-4
weight_decay: 1.0e-2

# Loss (no LPIPS for speed)
lpips_weight: 0.0
lpips_frac: 0.5
lpips_net: alex

# Viz
viz_every: 200
viz_max_items: 4
viz_max_T: 4
