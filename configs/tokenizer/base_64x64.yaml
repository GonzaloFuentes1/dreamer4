# configs/tokenizer/base_64x64.yaml
# Tokenizer para 64×64. Misma arquitectura base que base_128x128 pero con
# 4× menos patches (256 vs 1024).

# Image / patching
H: 64
W: 64
C: 3
patch: 4

# Architecture
d_model: 256
n_heads: 4
depth: 8
n_latents: 16
d_bottleneck: 32
dropout: 0.05
mlp_ratio: 4.0
time_every: 1
latents_only_time: true
scale_pos_embeds: false
mae_p_min: 0.0
mae_p_max: 0.9

# Optimizer
lr: 1.0e-4
weight_decay: 1.0e-2
warmup_steps: 2000
lr_schedule: constant_with_warmup
grad_clip: 1.0

# Loss
lpips_weight: 0.2
lpips_frac: 0.5
lpips_net: alex
use_loss_norm: false

viz_every: 500
viz_max_items: 4
viz_max_T: 8
